# Desired state for branch-office firewalls, keyed by cmdb path.
#
# A *role* template: what is true of one class of firewall, where
# baseline.yaml says what is true of the fleet. Every template selected
# for a host is rendered separately and then merged into one desired
# state, so a role adds to the baseline rather than replacing it.
#
# The merge is deep and strict. Asserting a field the baseline does not
# stacks onto the same object; asserting the same value it already does
# is fine; asserting a *different* value at the same coordinate raises,
# because two templates disagreeing is a fault in the rules and there is
# no rule for picking a winner. So a baseline can only hold what every
# role using it agrees with.
#
# The same vars/<host>.yaml feeds this file and the baseline: a variable
# is a fact about the firewall, not about the template consuming it.
# Everything baseline.yaml says about quoting applies here too.

system/global:
  # Not asserted by the baseline, on a section that is: the two stack
  # instead of one clobbering the other at the cmdb path.
  admin-lockout-duration: 60
  # Asserted identically by the baseline. An overlap is not a conflict.
  admin-concurrent: enable
  # Also asserted by the baseline, and identical only once both files
  # have been rendered from the same vars file.
  timezone: "{{ timezone }}"

system/ntp:
  ntpserver:
    # Two levels below the cmdb path, into a row the baseline also writes
    # to -- its `server` and `authentication` survive this.
    1:
      ntpv3: disable
